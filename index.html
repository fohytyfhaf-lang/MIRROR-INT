<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OMEGA SYSTEM</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BOOT -->
<section id="boot">
  <pre id="bootLog"></pre>
  <div id="bootBar"><div id="bootFill"></div></div>
</section>

<!-- LOGIN -->
<section id="login" class="hidden">
  <input id="user" placeholder="user">
  <input id="pass" type="password" placeholder="pass">
  <button onclick="login()">LOGIN</button>
  <p id="loginStatus"></p>
</section>

<!-- DESKTOP -->
<main id="desktop" class="hidden">

  <div onclick="openApp('chat')">Chat</div>
  <div onclick="openApp('camera')">Camera</div>
  <div onclick="openApp('files')">Files</div>

  <div id="chatWindow" class="window hidden">
    <div class="title">CHAT <button onclick="closeApp('chat')">X</button></div>
    <pre id="chatLog"></pre>
    <input id="chatInput">
    <button onclick="sendChat()">SEND</button>
  </div>

  <div id="cameraWindow" class="window hidden">
    <div class="title">CAMERA <button onclick="closeApp('camera')">X</button></div>
    <img id="camView" width="300">
    <button onclick="nextCam()">NEXT</button>
  </div>

</main>

<script type="module" src="./systems/core.js"></script>
</body>
</html>
