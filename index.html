<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MIRROR-INT 6.0 FIXED</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BOOT -->
<div id="boot">BOOTING SYSTEM...</div>

<!-- LOGIN -->
<div id="login" class="hidden">
  <div class="window">
    <div class="title">LOGIN</div>
    <input id="user" placeholder="USER">
    <input id="pass" type="password" placeholder="PASS">
    <button onclick="login()">ENTER</button>
    <p id="loginStatus"></p>
  </div>
</div>

<!-- DESKTOP -->
<div id="desktop" class="hidden">

  <div class="taskbar">MIRROR-INT 6.0</div>

  <button onclick="openApp('chat')">CHAT</button>
  <button onclick="openApp('camera')">CAM</button>
  <button onclick="openApp('game')">GAME</button>

  <div id="chat" class="window hidden">
    <div class="title">CHAT</div>
    <pre id="chatBox"></pre>
    <input id="chatInput">
    <button onclick="sendMsg()">SEND</button>
  </div>

  <div id="camera" class="window hidden">
    <div class="title">CAMERA</div>
    <img id="camImg">
    <button onclick="nextCam()">NEXT</button>
  </div>

  <div id="game" class="window hidden">
    <div class="title">GAME</div>
    <canvas id="canvas" width="300" height="150"></canvas>
    <button onclick="startGame()">START</button>
  </div>

</div>

<audio id="bgm" src="audio/background.mp3" loop></audio>

<script src="core.js"></script>
<script src="boot.js"></script>
<script src="login.js"></script>
<script src="chat.js"></script>
<script src="camera.js"></script>
<script src="game.js"></script>

</body>
</html>
