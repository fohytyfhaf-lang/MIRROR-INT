<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MIRROR INT V7 FIXED</title>

<style>
body {
  margin:0;
  font-family: monospace;
  background: radial-gradient(#05070a, #000);
  color:#00ff9d;
  overflow:hidden;
}

#bg {
  position:fixed;
  inset:0;
  background:url("https://i.imgur.com/3ZQ3Z8B.gif");
  opacity:0.05;
  pointer-events:none;
}

/* LOGIN */
#login {
  position:absolute;
  top:35%;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
}

/* MAIN */
#main {
  display:none;
}

/* DESKTOP */
#desktop {
  display:flex;
  gap:15px;
  padding:15px;
}

.icon {
  padding:10px;
  border:1px solid #00ff9d;
  cursor:pointer;
}

/* WINDOWS */
.window {
  display:none;
  position:absolute;
  top:20%;
  left:25%;
  width:420px;
  height:320px;
  background:black;
  border:1px solid #00ff9d;
  padding:10px;
}

/* CHAT */
#staffLog, #chatLog {
  height:200px;
  overflow:auto;
  background:#000;
  padding:5px;
  border:1px solid #00ff9d;
}

/* CAMERA */
img {
  width:320px;
  display:block;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- ================= LOGIN ================= -->
<div id="login">
  <h2>MIRROR INT LOGIN</h2>

  <input id="user" placeholder="user"><br>
  <input id="pass" type="password" placeholder="pass"><br>

  <button onclick="login()">ENTER</button>
</div>

<!-- ================= MAIN ================= -->
<div id="main">

<div id="desktop">
  <div class="icon" onclick="openWin('staff')">STAFF</div>
  <div class="icon" onclick="openWin('camera')">CAMERA</div>
  <div class="icon" onclick="openWin('files')">FILES</div>
  <div class="icon" onclick="openWin('smile')">SMILE</div>
</div>

<div>
CLOCK: <span id="clock"></span>
</div>

<img id="cam" src="https://i.imgur.com/8QfQx.gif">

<!-- STAFF -->
<div id="staff" class="window">
<button onclick="closeWin('staff')">X</button>

<pre id="staffLog"></pre>

<input id="staffInput">
<button onclick="sendStaffMessage()">SEND</button>
</div>

<!-- FILES -->
<div id="files" class="window">
<button onclick="closeWin('files')">X</button>

<pre id="fileView">NO FILE</pre>

<button onclick="alert('HACK SYSTEM (later upgrade)')">HACK</button>
</div>

<!-- CAMERA -->
<div id="camera" class="window">
<button onclick="closeWin('camera')">X</button>

<button onclick="switchCam()">SWITCH CAMERA</button>

<p>Use main camera below</p>
</div>

<!-- SMILE -->
<div id="smile" class="window">
<button onclick="closeWin('smile')">X</button>

<pre id="chatLog"></pre>

<input id="chatInput">
<button onclick="sendSmile()">SEND</button>
</div>

</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
