<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMEGA SYSTEM</title>

<link rel="stylesheet" href="style.css">
  
  <link rel="icon" type="image/png" href="favicon.png">
<link rel="shortcut icon" href="favicon.ico">
</head>

<body>

<audio id="bgm"></audio>

<!-- LOGIN -->

<section id="loginScreen">

<div id="loginBox">

<h1>OMEGA SYSTEM</h1>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button id="loginBtn">Log In</button>

<p id="status"></p>

</div>

</section>

<!-- DESKTOP -->

<main id="desktop" class="hidden">

<div id="icons">

<div class="icon" onclick="openApp('logs')">
📁
<span>Logs</span>
</div>

<div class="icon" onclick="openApp('camera')">
📷
<span>Camera</span>
</div>
  
<div class="icon" onclick="openApp('console')">
⌨️
<span>Console</span>
</div>

<div class="icon" onclick="openApp('files')">
🗂️
<span>Files</span>
</div>

</div>

  
<div id="consoleWindow" class="window hidden">

  <div class="title">
    SYSTEM CONSOLE
    <button onclick="closeApp('console')">X</button>
  </div>

  <pre id="consoleLog"></pre>

  <input id="consoleInput" placeholder="type command...">

  <button id="consoleEnter">ENTER</button>

</div>
  
<!-- TASKBAR -->

<div id="taskbar">

<button id="startButton">Start</button>

<div id="clock">00:00</div>

</div>

<!-- LOG WINDOW -->

<div id="logsWindow" class="window hidden">

<div class="title">

Logs

<button onclick="closeApp('logs')">X</button>

</div>

<pre id="chatLog"></pre>

<input id="chatInput">

<button id="sendBtn">Send</button>

</div>

<!-- CAMERA -->

<div id="cameraWindow" class="window hidden">

  <div class="title">
    Camera
    <button onclick="closeApp('camera')">X</button>
  </div>

  <p id="cameraView">NO SIGNAL</p>

  <button onclick="nextCam()">NEXT CAMERA</button>

</div>

<!-- FILES -->

<div id="filesWindow" class="window hidden">
  <div class="title">
    Files
    <button onclick="closeApp('files')">X</button>
  </div>

  <div id="filesList"></div>
</div>

</main>

<script type="module" src="core.js"></script>

</body>
</html>
