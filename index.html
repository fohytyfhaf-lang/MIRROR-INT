<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MIRROR-INT 6.0</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<section id="login">
  <div class="window">
    <div class="title">AUTH</div>

    <input id="user" placeholder="user">
    <input id="pass" type="password" placeholder="pass">

    <button onclick="loginSystem()">LOGIN</button>
    <p id="loginStatus"></p>
  </div>
</section>
<!-- GAME -->
<main id="screen" class="hidden">

  <div class="window">
    <div class="title">SYSTEM</div>

    <button onclick="toggleMusic()">MUSIC</button>

    <canvas id="game" width="500" height="200"></canvas>

    <div id="codeBox">CODE: 0</div>
  </div>

  <div class="window">
    <div class="title">CHAT</div>
    <pre id="chat"></pre>
    <input id="msg">
    <button onclick="sendMsg()">SEND</button>
  </div>

</main>

<audio id="music" src="audio/background.mp3" loop></audio>

<script src="core.js"></script>

<script src="systems/audio.js"></script>
<script src="systems/boot.js"></script>
<script src="systems/camera.js"></script>
<script src="systems/chat.js"></script>
<script src="systems/clock.js"></script>
<script src="systems/game.js"></script>
<script src="systems/login.js"></script>
<script src="systems/windows.js"></script>
<script src="systems/core.js"></script>
  
</body>
</html>
