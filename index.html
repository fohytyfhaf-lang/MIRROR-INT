<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIRROR-INT V95</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- =========================
BOOT SCREEN
========================= -->
<div id="loading">

  <div id="bootWindow">

    <div id="bootHeader">
      Система зеркального отображения
    </div>

    <div id="bootBody">

      <p>Запуск MIRROR-INT...</p>

      <p id="bootStatus">
        Инициализация системы...
      </p>

      <div id="bootBar">
        <div id="bootProgress"></div>
      </div>

      <p id="loadText">0%</p>

    </div>

  </div>

</div>

<!-- =========================
LOGIN
========================= -->
<div id="login" style="display:none;">

  <div class="loginBox">

    <div class="windowHeader">
      Авторизация MIRROR-INT
    </div>

    <div class="windowBody">

      <input id="user" placeholder="USERNAME">

      <input id="pass" type="password" placeholder="PASSWORD">

      <button onclick="loginSystem()">
        LOGIN
      </button>

      <p id="loginStatus"></p>

      <div class="hint">
</html>
