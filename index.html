
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MIRROR-INT</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- BOOT -->
<section id="loading">

<div id="bootWindow">

<h1>MIRROR-INT</h1>

<p id="bootStatus">Loading system...</p>

<div id="bootBar">
<div id="bootProgress"></div>
</div>

<p id="loadText">0%</p>

</div>

</section>

<!-- LOGIN -->
<section id="login">

<div class="window loginWindow">

<div class="window-header">
AUTHORIZATION
</div>

<div class="window-body">

<input id="user" placeholder="USERNAME">

<input id="pass" type="password" placeholder="PASSWORD">

<button onclick="loginSystem()">
LOGIN
</button>

<p id="loginStatus"></p>

</div>

</div>

</section>

<!-- DESKTOP -->
<main id="screen">

<div id="desktop">

<div class="desktop-icon" onclick="openWindow('cameraWindow')">
📹
<span>CAMERAS</span>
</div>

<div class="desktop-icon" onclick="openWindow('staffWindow')">
💬
<span>STAFF</span>
</div>

<div class="desktop-icon" onclick="openWindow('gameWindow')">
🎮
<span>GAME</span>
</div>

</div>

<!-- CAMERA -->
<div id="cameraWindow" class="window">

<div class="window-header">
CAMERAS
</div>

<div class="window-body">

<img
id="cam"
src="cam_secret.gif"
>

<br><br>

<button onclick="switchCamera(-1)">
PREV
</button>

<button onclick="switchCamera(1)">
NEXT
</button>

<p id="cameraName">
CAM SECRET
</p>

</div>

</div>

<!-- STAFF -->
<div id="staffWindow" class="window">

<div class="window-header">
STAFF CHAT
</div>

<div class="window-body">

<pre id="staffLog"></pre>

<input id="staffInput">

<button onclick="sendStaffMessage()">
SEND
</button>

</div>

</div>

<!-- GAME -->
<div id="gameWindow" class="window">

<div class="window-header">
VOID RUNNER
</div>

<div class="window-body">

<canvas
id="gameCanvas"
width="500"
height="250"
></canvas>

<br><br>

<button onclick="startGame()">
START
</button>

</div>

</div>

</main>

<script src="script.js"></script>

</body>
</html>
