<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MIRROR-INT 6.5</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADING -->
<section id="loading" class="center">

  <div class="window">

    <div class="title">
      MIRROR-INT BOOT
    </div>

    <p id="bootText">BOOTING...</p>

    <div id="bootBar">
      <div id="bootFill"></div>
    </div>

  </div>

</section>

<!-- LOGIN -->
<section id="login" class="center">

  <div class="window">

    <div class="title">
      AUTHORIZATION
    </div>

    <input id="user" placeholder="user">

    <input
      id="pass"
      type="password"
      placeholder="password"
    >

    <button onclick="loginSystem()">
      LOGIN
    </button>

    <p id="loginStatus"></p>

  </div>

</section>

<!-- DESKTOP -->
<main id="screen" class="hidden">

  <!-- GAME WINDOW -->
  <div
    class="window draggable"
    id="gameWindow"
    style="top:40px;left:40px;"
  >

    <div class="title">
      VOID RUNNER
    </div>

    <button onclick="toggleMusic()">
      MUSIC
    </button>

    <canvas
      id="game"
      width="500"
      height="200"
    ></canvas>

    <div id="codeBox">
      CODE: 0
    </div>

  </div>

  <!-- CHAT WINDOW -->
  <div
    class="window draggable"
    id="chatWindow"
    style="top:40px;left:600px;"
  >

    <div class="title">
      STAFF CHAT
    </div>

    <pre id="chat"></pre>

    <input id="msg">

    <button onclick="sendMsg()">
      SEND
    </button>

  </div>

</main>

<!-- AUDIO -->
<audio
  id="music"
  src="audio/background.mp3"
  loop
></audio>

<!-- SYSTEM -->
<script type="module" src="./systems/core.js"></script>

</body>
</html>
