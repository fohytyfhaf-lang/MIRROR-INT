<!DOCTYPE html>
<html>
<head>
  <title>OBSERVATION NODE</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

 <div id="screen">

  <div class="title glitch">
    MIRROR / OBSERVATION SYSTEM
  </div>

  <div class="panel">
    <p>SYSTEM DIALOG</p>

    <div id="dialog">
      > SYSTEM: OBSERVATION INITIATED
    </div>
  </div>

</div>

  <div class="panel">
    <p id="systemState">STATUS: OBSERVING SUBJECT</p>
    <p id="warning"></p>
  </div>

  <div class="panel">
    <p>SECTORS</p>

    <button onclick="enter(1)">NODE A</button>
    <button onclick="enter(2)">NODE B</button>
    <button onclick="enter(3)">NODE C</button>
    <button onclick="enter(4)">NODE D</button>

  </div>

  <div class="panel">
    <p id="location">LOCATION: UNKNOWN</p>
    <p id="output">WAITING FOR ACTION...</p>
  </div>

  <div class="panel">
    <p>FRAGMENTS: <span id="frags">NONE</span></p>
  </div>

  <div class="panel">
    <a href="index.html">← EXIT</a>
  </div>

</div>

<script>
let fragments = [];
let mistakes = 0;

function enter(id) {

  const out = document.getElementById("output");
  const loc = document.getElementById("location");
  const warn = document.getElementById("warning");

  loc.innerText = "LOCATION: NODE " + id;

  // СИСТЕМА СЛЕДИТ
  warn.innerText = "SYSTEM: TRACKING USER ACTIONS...";

  // ЛОЖНЫЕ СЕКТОРА
  if (id === 1) {
    out.innerText = "EMPTY NODE. NO DATA.";
    mistake();
  }

  // ПОДСКАЗКА (но неполная)
  if (id === 2) {
    out.innerText = "HINT DETECTED: PARTIAL SIGNAL → ROR";
  }

  // НАСТОЯЩИЙ ФРАГМЕНТ
  if (id === 3) {
    out.innerText = "CRITICAL FRAGMENT ACQUIRED: MIR";
    addFragment("MIR");
  }

  // ЛОВУШКА
  if (id === 4) {
    out.innerText = "SYSTEM TRAP ACTIVATED";
    mistake();
  }

  checkSystem();
  updateFragments();
}

function addFragment(f) {
  if (!fragments.includes(f)) {
    fragments.push(f);
  }
}

function mistake() {
  mistakes++;

  const warn = document.getElementById("warning");

  warn.innerText =
    "WARNING: IRREGULAR BEHAVIOR DETECTED (" + mistakes + ")";

  if (mistakes >= 2) {
    document.getElementById("systemState").innerText =
      "STATUS: RESTRICTED OBSERVATION MODE";
  }

  if (mistakes >= 3) {
    document.getElementById("systemState").innerText =
      "STATUS: LOCKED ACCESS ATTEMPT";
  }
}

function updateFragments() {
  document.getElementById("frags").innerText =
    fragments.length ? fragments.join(" + ") : "NONE";
}

function checkSystem() {

  if (fragments.includes("MIR") && mistakes < 3) {

    setTimeout(() => {
      document.getElementById("systemState").innerText =
        "STATUS: ACCESS PATH DETECTED";
    }, 1000);

  } else if (mistakes >= 3) {

    setTimeout(() => {
      document.getElementById("output").innerText =
        "ACCESS DELAYED... SYSTEM ANALYZING SUBJECT";
    }, 800);
  }
}
</script>

</body>
</html>
